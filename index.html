<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <title>Landing Page</title>
</head>

<body>
    <div id="header">
        <div id="saldo-card" class="card bg-base-300 shadow-2xl w-full border-2 border-white">
            <div class="card-body">
                <div class="card-title text-green-400 text-3xl">SALDO</div>
                <p class="text-xl" id="saldo">Rp. 20.000</p>
                <div class="card-actions justify-end">
                    <button class="btn btn-success" onclick="tambah.showModal()">Tambah</button>
                    <button class="btn btn-error" onclick="kurang.showModal()">Kurang</button>
                    
                </div>
            </div>
        </div>
    </div>

    <div id="stats" class="flex gap-2">
        <div class="card card bg-base-300 shadow-2xl w-full border-2 border-white">
            <div class="card-body">
                <div class="card-title text-green-400 text-3xl">Masukan</div>
                <p class="text-lg" id="masukan">Rp. 20.000</p>
            </div>
        </div>
        <div class="card card bg-base-300 shadow-2xl w-full border-2 border-white">
            <div class="card-body">
                <div class="card-title text-red-400 text-3xl">Pengeluaran</div>
                <p class="text-lg" id="pengeluaran">Rp. 20.000</p>
            </div>
        </div>
    </div>

    <div id="history">
        <div class="card card bg-base-300 shadow-2xl w-full border-2 border-white ">
            <div class="card-body">
                <div class="card-title">Riwayat</div>

                    <div id="riwayat" class="max-h-72 overflow-y-auto space-y-2">
                        <p class="opacity-20 flex justify-center"></p>
                    </div>

            </div>
        </div>
    </div>

    <dialog id="tambah" class="modal">
        <div class="modal-box border-2 border-slate-700 w-100">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h1 class="text-center text-2xl font-bold">Tambah Saldo</h1>

            <div>
                <label>
                    <span class="text-2xl flex mb-4">Nominal</span>
                </label>
                <div>
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        Rp
                        <input id="nominal" type="number" class="grow validator" placeholder="10.000">
                    </label>
                    <p class="validator-hint">Isi nominalnya!</p>
                </div>
            </div>
            <div class="btn btn-primary w-full" id="submit">Submit</div>
        </div>
    </dialog>

    <dialog id="kurang" class="modal">
        <div class="modal-box border-2 border-slate-700 w-100">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
            </form>
            <h1 class="text-center text-2xl font-bold">Kurangi Saldo</h1>

            <div>
                <label>
                    <span class="text-2xl flex mb-4">Nominal</span>
                </label>
                <div>
                    <label class="input input-bordered flex items-center gap-2 w-full">
                        Rp
                        <input id="nominalK" type="number" class="grow validator" placeholder="10.000">
                    </label>
                    <p class="validator-hint">Isi nominalnya!</p>
                </div>
            </div>
            <div class="btn btn-primary w-full" id="submitK">Submit</div>
        </div>
    </dialog>

<dialog id="reset" class="modal">
  <div class="modal-box">
    <h3 class="text-lg font-bold">Apakah kamu yakin?</h3>
    <p class="py-4">Tombol ini akan menghapus semua data history dan saldomu!</p>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-success mr-5">Tidak</button>
        <button id="reset-btn-confirm" class="btn btn-error">Ya</button>
      </form>
    </div>
  </div>
</dialog>

    <div id="reset-btn">
        <div class="btn btn-error" onclick="reset.showModal()">RESET</div>
    </div>
    <script src="script.js"></script>
</body>

</html>
